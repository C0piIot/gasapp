name: Build
permissions:
  contents: read

on:
  push:
    branches: [ "master" ]

env:
  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

jobs:
  test:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go test ./...

  deploy:
    needs: test
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v6
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: >
          flyctl deploy --remote-only
          --build-arg BUILD_VERSION=$(date +'%Y%m%d%H%M%S').$(git rev-parse --short HEAD)
