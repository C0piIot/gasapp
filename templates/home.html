<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <title>GasApp - Precio de gasolineras de tu zona</title>
    <meta name="description" content="Mapa con las estaciones de servicio de España. Localiza las gasolineras más baratas de tu zona.">
    <link rel="apple-touch-icon" sizes="180x180" href="/static/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/static/favicon-16x16.png">
    <link rel="manifest" href="/static/site.webmanifest">
    <link rel="mask-icon" href="/static/safari-pinned-tab.svg" color="#5bbad5">
    <meta name="apple-mobile-web-app-title" content="GasApp">
    <meta name="application-name" content="GasApp">
    <meta name="msapplication-TileColor" content="#2d89ef">
    <meta name="theme-color" content="#ffffff">
    <meta name="theme-color" content="#a991d4">
    <style>
        body { font-family: system-ui, sans-serif; touch-action: manipulation; }
        html, body { height: 100%; overscroll-behavior: none; }
        body { padding:0; margin:0; display:flex; flex-direction: column; }
        .hidden { display: none; }
        #map { flex:1; }
        h1 {
            margin:0;
            font-size: 1.6rem;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
        }
        h1 a {
            text-decoration: none;
            color: inherit;
            margin-left: 1rem;
        }
        #station-info, #fuel-selector, #favorites { padding: 1rem; }
        #station-info p.prices>span { white-space: nowrap; margin-right: 12px; }
        #fuel-selector p { margin-top: 1rem; text-align: center;}
        #favorite-toggle {
            background: none; border: none; cursor: pointer;
            font-size: 1.4rem; line-height: 1;
            padding: 0; color: inherit;
        }
        #favorites ul { list-style: none; padding: 0; margin: 0.5rem 0 0; max-height: 60vh; overflow-y: auto; }
        #favorites li { display: flex; align-items: stretch; border-bottom: 1px solid #eee; }
        #favorites .row {
            flex: 1; background: none; border: none; cursor: pointer;
            padding: 0.6rem 0.4rem; text-align: left; color: inherit;
            display: grid; grid-template-columns: 1fr auto; column-gap: 0.5rem;
            font-size: 0.95rem;
        }
        #favorites .row .name { font-weight: bold; grid-column: 1; }
        #favorites .row .city { grid-column: 1; font-size: 0.8rem; color: #666; }
        #favorites .row .price { grid-column: 2; grid-row: 1 / span 2; align-self: center; font-weight: bold; }
        #favorites .remove {
            background: none; border: none; cursor: pointer;
            padding: 0 0.8rem; font-size: 1.4rem; color: #888;
        }
        #favorites p.empty, #favorites p.loading { margin: 0.5rem 0; color: #666; font-size: 0.9rem; }
        .station {
            padding: 0.2rem;
            background: white;
            font-size: 1rem;
            border: 2px solid dimgray;
            height: 2rem;
            width: 2rem;
            text-align: center;
        }
        .station div {
            background: dimgray;
            color: white;
            font-size: 0.6rem;
            font-weight: bold;
            position: fixed;
            bottom: -1px;
            left: -1px;
            right: -1px;
        }
        .station.cheap { border-color: green; }
        .station.cheap div { background: green; }
        .station.medium { border-color: orangered; }
        .station.medium div { background: orangered; }
        .station.expensive { border-color: darkred; }
        .station.expensive div { background: darkred; }
        #directions {
            background-color: blue;
            color: white;
            text-decoration: none;
            padding: 0.4rem 0.8rem;
            font-style: normal;
        }
        address { text-align: right; }
        address p { text-align: left; }
        #updated {
            font-size: 0.6rem;
            font-style: normal;
            margin-top: -0.6rem;
        }
        #price-chart {
            margin: 0.5rem 0;
            color: #555;
            font-size: 0.8rem;
        }
        #price-chart .spark {
            display: block;
            /* Pin a font whose block glyphs are bottom-aligned; Chrome's
               default monospace fallback renders them with inconsistent
               baselines, jittering the sparkline vertically. */
            font-family: 'DejaVu Sans Mono', 'Noto Sans Mono', 'Liberation Mono', monospace;
            font-size: 1.2rem;
            line-height: 1;
            color: dimgray;
            letter-spacing: 1px;
            white-space: nowrap;
            overflow-x: auto;
        }
        #price-chart .range {
            display: flex;
            justify-content: space-between;
            font-size: 0.65rem;
            margin-top: 0.1rem;
        }
    </style>
    <link rel="stylesheet" href="/static/icons.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet.locatecontrol@0.79.0/dist/L.Control.Locate.min.css">
</head>
<body data-build="{{.BuildVersion}}">
<div id="map"></div>
<div id="station-info" class="hidden">
    <h1>
        <div>
            <button type="button" id="favorite-toggle" title="Favorito" aria-label="Favorito">☆</button>
            <span></span>
        </div>
        <a href="#" title="Compartir" class="hidden">
        <i class="fa fa-share"></i></a>
    </h1>
    <p class="prices">
        <span id="petrol95"><i class="fa fa-gas-station"></i> 95 <b></b></span>
        <span id="petrol98"><i class="fa fa-gas-station"></i> 98 <b></b></span>
        <span id="gasoil"><i class="fa fa-gas-station"></i> Gasoil <b></b></span>
        <span id="glp"><i class="fa fa-gas-station"></i> GLP <b></b></span>
    </p>
    <div id="price-chart" class="hidden">
        <span class="spark"></span>
        <span class="range"><span class="from"></span><span class="to"></span></span>
    </div>
    <address>
        <p></p>
        <a href="#" target="_blank" id="directions"><i class="fa fa-navigation"></i> Get directions</a>
    </address>
    <p id="updated">Actualizado: <span></span></p>
</div>
<div id="favorites" class="hidden">
    <h1>Favoritos</h1>
    <p class="loading hidden">Cargando…</p>
    <p class="empty hidden">Aún no tienes favoritos. Toca la estrella en una estación para añadirla.</p>
    <ul></ul>
</div>
<div id="fuel-selector" class="hidden">
    <h1>Combustible preferido</h1>
    <p>
        <select>
            <option value="petrol95">Sin plomo 95 - E5/E10</option>
            <option value="petrol98">Sin plomo 98 - E10</option>
            <option value="gasoil">Gasoil - B7</option>
            <option value="glp">GLP</option>
        </select>
        <button type="button">Guardar</button>
    </p>
</div>
<template id="icon">
    <i class="fa fa-gas-station"></i>
    <div>{price}</div>
</template>
<template id="favorite-row">
    <li>
        <button type="button" class="row">
            <span class="name"></span>
            <span class="city"></span>
            <span class="price"></span>
        </button>
        <button type="button" class="remove" aria-label="Quitar">×</button>
    </li>
</template>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/leaflet.locatecontrol@0.79.0/dist/L.Control.Locate.min.js" charset="utf-8"></script>
<script src="https://cdn.jsdelivr.net/npm/leaflet-edgebuffer@1.0.1/src/leaflet.edgebuffer.js"></script>
<script>
    let latestFetchUrl = '',
        latestFetchTime = 0,
        markers = {},
        historyEnd = 0,
        fuel = localStorage.getItem('fuel') || 'petrol95',
        currentStationId = null,
        lat, lon, stationId;
    [lat, lon, stationId] = location.hash.replace('#','').split(',', 3);
    const savedView = (() => {
        try {
            const v = JSON.parse(localStorage.getItem('view'));
            if (v && Number.isFinite(v.lat) && Number.isFinite(v.lon) && Number.isFinite(v.zoom)) {
                return v;
            }
        } catch (e) {}
        return null;
    })();
    function loadFavorites() {
        try {
            const f = JSON.parse(localStorage.getItem('favorites'));
            if (Array.isArray(f)) return f.filter(x => Number.isFinite(x));
        } catch (e) {}
        return [];
    }
    function saveFavorites(favs) {
        localStorage.setItem('favorites', JSON.stringify(favs));
    }
    function isFavorite(pk) {
        return loadFavorites().includes(Number(pk));
    }
    function toggleFavorite(pk) {
        pk = Number(pk);
        const favs = loadFavorites(),
            idx = favs.indexOf(pk);
        if (idx === -1) favs.unshift(pk); else favs.splice(idx, 1);
        saveFavorites(favs);
        renderFavorites();
        if (currentStationId === pk) updateFavoriteToggle(pk);
    }
    async function renderFavorites() {
        const ids = loadFavorites(),
            panel = qs('#favorites'),
            list = panel.querySelector('ul'),
            empty = panel.querySelector('.empty'),
            loading = panel.querySelector('.loading');
        if (ids.length === 0) {
            list.replaceChildren();
            loading.classList.add('hidden');
            empty.classList.remove('hidden');
            return;
        }
        empty.classList.add('hidden');
        if (list.children.length === 0) loading.classList.remove('hidden');
        const url = stationsUrl + '?ids=' + ids.join(','),
            response = await (await fetch(url)).json();
        const byId = new Map();
        response.stations.forEach((row) => {
            const s = {};
            [s.pk, s.name, s.petrol95, s.petrol98, s.gasoil, s.glp,
             s.address, s.city, s.postal_code, s.location, s.updated] = row;
            s.location = [s.location[1], s.location[0]];
            byId.set(s.pk, s);
        });
        const validFavs = ids.filter(id => byId.has(id));
        if (validFavs.length !== ids.length) saveFavorites(validFavs);
        loading.classList.add('hidden');
        if (validFavs.length === 0) {
            list.replaceChildren();
            empty.classList.remove('hidden');
            return;
        }
        const tpl = qs('#favorite-row'),
            rows = validFavs.map((id) => {
                const s = byId.get(id),
                    li = tpl.content.firstElementChild.cloneNode(true);
                li.dataset.id = id;
                li.querySelector('.name').textContent = s.name;
                li.querySelector('.city').textContent = [s.city, s.postal_code].filter(Boolean).join(', ');
                li.querySelector('.price').textContent = s[fuel] ? s[fuel].toLocaleString('es', currencyOptions) : '--';
                li.querySelector('.row').addEventListener('click', () => {
                    panel.classList.add('hidden');
                    map.setView(s.location, 15);
                    showStation(s);
                });
                li.querySelector('.remove').addEventListener('click', (e) => {
                    e.stopPropagation();
                    toggleFavorite(id);
                });
                return li;
            });
        list.replaceChildren(...rows);
    }
    function updateFavoriteToggle(pk) {
        if (pk === null || pk === undefined) return;
        qs('#favorite-toggle').textContent = isFavorite(pk) ? '★' : '☆';
    }
    const qs = s =>  document.querySelector(s),
        shareAnchor = qs('#station-info h1 a'),
        stationsUrl = "/stations/",
        iconTemplate = qs('#icon').innerHTML,
        ios = /iPad|iPhone|iPod|Darwin/.test(navigator.platform) && !window.MSStream,
        currencyOptions = { style: 'currency', currency: 'EUR', minimumFractionDigits: 3},
        ToolsControl = L.Control.extend({
            options: { position: 'topright' },
            onAdd: () => {
                const container = L.DomUtil.create('div', 'leaflet-control leaflet-bar'),
                    fuelLink = L.DomUtil.create('a', '', container),
                    favLink = L.DomUtil.create('a', '', container);

                fuelLink.href = '#';
                fuelLink.title = 'Carburante preferido';
                fuelLink.innerHTML = '<i class="fa fa-gas-station"></i>';
                L.DomEvent.on(fuelLink, 'click', L.DomEvent.stop).on(fuelLink, 'click', () => {
                    qs('#fuel-selector select').value = fuel;
                    qs('#fuel-selector').classList.remove('hidden');
                    qs('#station-info').classList.add('hidden');
                    qs('#favorites').classList.add('hidden');
                });

                favLink.href = '#';
                favLink.title = 'Favoritos';
                favLink.style.fontSize = '1.2rem';
                favLink.style.lineHeight = '26px';
                favLink.innerHTML = '★';
                L.DomEvent.on(favLink, 'click', L.DomEvent.stop).on(favLink, 'click', openFavorites);

                return container;
            }
        });
    const SPARK_TICKS = '▁▂▃▄▅▆▇█';
    function renderChart(history, endTs) {
        const chart = qs('#price-chart');
        if (!Array.isArray(history) || !history.some(v => v !== null && v !== undefined)) {
            chart.classList.add('hidden');
            return;
        }
        const known = history.filter(p => p !== null && p !== undefined);
        let lo = Math.min(...known), hi = Math.max(...known);
        const span = hi - lo;

        // Map each known day to one of 8 block glyphs; unknown days become a
        // gap so a missing stretch reads as a hole, not a flat low.
        const spark = history.map(p => {
            if (p === null || p === undefined) return ' ';
            const t = span === 0 ? SPARK_TICKS.length - 1
                : Math.round(((p - lo) / span) * (SPARK_TICKS.length - 1));
            return SPARK_TICKS[t];
        }).join('');

        const fmt = v => v.toLocaleString('es', currencyOptions);
        const sparkEl = qs('#price-chart .spark');
        sparkEl.textContent = spark;
        qs('#price-chart .from').textContent = `${fmt(lo)} – ${fmt(hi)}`;

        const dayMs = 86400 * 1000,
            endDate = new Date(endTs * 1000),
            startDate = new Date(endDate.getTime() - history.length * dayMs),
            dateFmt = d => d.toLocaleDateString('es', {day: '2-digit', month: '2-digit'});
        qs('#price-chart .to').textContent =
            `${dateFmt(startDate)} – ${dateFmt(new Date(endDate.getTime() - dayMs))}`;

        chart.classList.remove('hidden');
        // Default to the right edge so the most recent days are shown first.
        sparkEl.scrollLeft = sparkEl.scrollWidth;
    }
    function showStation(s) {
        currentStationId = s.pk;
        qs('#station-info h1 span').textContent = s.name;
        const location = s.location.join();
        qs('#station-info address p').textContent = [s.address, s.postal_code, s.city].join(', ');
        ['petrol95', 'petrol98', 'gasoil', 'glp'].forEach((k) => {
            if (s[k]) {
                qs('#' + k + ' b').textContent = s[k].toLocaleString('es', currencyOptions);
            }
            qs('#' + k).classList.toggle('hidden', !s[k]);
        });
        qs('#station-info').classList.remove('hidden');
        qs('#fuel-selector').classList.add('hidden');
        qs('#favorites').classList.add('hidden');
        if (ios) {
            qs('#directions').href = `https://maps.apple.com/?daddr=${location}&dirflg=d`;
        } else {
            qs('#directions').href = `https://www.google.com/maps/dir/?api=1&destination=${location}&travelmode=driving&dir_action=navigate`;
        }
        qs('#updated span').textContent = new Date(s.updated * 1000).toLocaleDateString('es', {});
        shareAnchor.href = `/#${location},${s.pk}`;
        shareAnchor.title = `⛽ ${s.name}`;
        updateFavoriteToggle(s.pk);
        renderChart(s.history, historyEnd);
    }
    function openFavorites() {
        qs('#station-info').classList.add('hidden');
        qs('#fuel-selector').classList.add('hidden');
        qs('#favorites').classList.remove('hidden');
    }
    async function updateStations(force) {
        const params = new URLSearchParams(),
            center = map.getBounds().getCenter();

        params.append('center', [center.lng.toFixed(2), center.lat.toFixed(2)].join());
        params.append('fuel', fuel);
        const url = stationsUrl + '?' + params.toString(),
            now = new Date();
        if((url == latestFetchUrl) && (now.getTime() - latestFetchTime) < 600000) {
            if(force !== true){
                return;
            }
        }
        latestFetchUrl = url;
        latestFetchTime = now.getTime();

        const response = await (await fetch(url)).json(),
            newMarkers = {};
        historyEnd = response.history_end || 0;
        let maxPrice = 0, minPrice = Number.MAX_VALUE;
        response.stations.forEach((station) => {
            const s = {};
            [
                s.pk,
                s.name,
                s.petrol95,
                s.petrol98,
                s.gasoil,
                s.glp,
                s.address,
                s.city,
                s.postal_code,
                s.location,
                s.updated,
                s.history
            ] = station;
            s.location = [s.location[1], s.location[0]];
            if(s[fuel]){
                minPrice = Math.min(s[fuel], minPrice);
                maxPrice = Math.max(s[fuel], maxPrice);
            }

            if(s.pk in markers){
                newMarkers[s.pk] = markers[s.pk];
                delete markers[s.pk];
            } else {
                const template = iconTemplate.replace('{price}', (s[fuel]|| '--').toLocaleString('es', currencyOptions));
                if(stationId == s.pk){
                    showStation(s);
                }
                newMarkers[s.pk] = L.marker(s.location, {
                    title: s.name,
                    alt: s.name,
                    price: s[fuel]|| false,
                    icon:  L.divIcon({
                        html: template,
                        className: 'station station-' + s.pk,
                        iconSize: [30, 30],
                        iconAnchor: [30, 30]
                    })
                })
                .addTo(map)
                .on('click', () => showStation(s));
            }
        });
        for(k in markers){
            map.removeLayer(markers[k]);
        }
        const firstThird = minPrice + ((maxPrice - minPrice) / 3),
            secondThird = maxPrice - ((maxPrice - minPrice) / 3);
        markers = newMarkers;
        for(k in markers){
            const price = markers[k].options.price,
                icon = qs('.station-' + k);
            if(price > secondThird){
                icon.classList.remove('cheap', 'medium');
                icon.classList.add('expensive');
            } else if(price > firstThird){
                icon.classList.remove('cheap', 'expensive');
                icon.classList.add('medium');
            } else if(price) {
                icon.classList.remove('expensive', 'medium');
                icon.classList.add('cheap');
            }
        }
    };

    const map = L.map('map', {
        preferCanvas: true,
        zoomControl: false,
        layers: [
            L.tileLayer('https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png', {
                attribution: `<a target="_blank" href="https://www.hotosm.org/" title="Humanitarian OpenStreetMap Team">💻</a> | <a target="_blank" href="https://openstreetmap.org" title="OSM">🗺️</a>| <a target="_blank" href="https://leafletjs.com" title="Leaflet">🍃</a> | <a target="_blank" href="https://www.buymeacoffee.com/dropdatabase">☕</a> | Build <a target="_blank" href="https://github.com/C0piIot/gasapp">${document.body.dataset.build}</a>`,
                view: 'Auto',
                edgeBufferTiles: 2
            })
        ]})
        .setView(
            [lat || (savedView && savedView.lat) || 40.4168, lon || (savedView && savedView.lon) || -3.7038],
            (lat && lon) ? 14 : (savedView ? savedView.zoom : 14)
        )
        .addControl(L.control.locate({
                position: 'topright',
                locateOptions: {
                    maxZoom: 16,
                    enableHighAccuracy: true
                }
            }))
        .addControl(L.control.zoom({position:'topright'}))
        .addControl(new ToolsControl())
        .on('click', () => {
            qs('#station-info').classList.add('hidden');
            qs('#fuel-selector').classList.add('hidden');
            qs('#favorites').classList.add('hidden');
        })
        .on('moveend', () => {
            const c = map.getCenter();
            localStorage.setItem('view', JSON.stringify({lat: c.lat, lon: c.lng, zoom: map.getZoom()}));
            updateStations();
        });
    if(!lat && !lon) {
        map.locate({setView: true, maxZoom: 13, enableHighAccuracy: true, maximumAge: 10});
    }
    updateStations();
    renderFavorites();

    map.attributionControl.setPrefix(false);

    qs('#fuel-selector button').addEventListener('click', () => {
        fuel = qs('#fuel-selector select').value;
        localStorage.setItem('fuel', fuel);
        for(k in markers){
            map.removeLayer(markers[k]);
        }
        markers = [];
        qs('#fuel-selector').classList.add('hidden');
        updateStations(true);
        renderFavorites();
    });

    qs('#favorite-toggle').addEventListener('click', () => {
        if (currentStationId !== null) toggleFavorite(currentStationId);
    });

    if ('share' in navigator) {
        shareAnchor.classList.remove('hidden');
        shareAnchor.addEventListener('click', (e) => {
            e.preventDefault();
            navigator.share({ url: shareAnchor.href, text: shareAnchor.title });
        });
    }

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/worker.js', { scope: '/' });
    }
</script>
</body>
</html>
